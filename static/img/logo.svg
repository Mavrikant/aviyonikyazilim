<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aviyonik Yazılım logosu: yapay ufuk göstergesi">
  <defs>
    <clipPath id="dial">
      <circle cx="32" cy="32" r="26"/>
    </clipPath>
    <linearGradient id="sky" x1="32" y1="6" x2="32" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E2A47"/>
      <stop offset="1" stop-color="#1D5288"/>
    </linearGradient>
    <linearGradient id="ground" x1="32" y1="32" x2="32" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D89A3D"/>
      <stop offset="1" stop-color="#9A6420"/>
    </linearGradient>
  </defs>

  <!-- Kadran: gökyüzü + zemin, hafif yatışlı ufuk -->
  <g clip-path="url(#dial)">
    <rect x="0" y="0" width="64" height="64" fill="url(#sky)"/>
    <path d="M2 36.6 L62 27.4 L62 62 L2 62 Z" fill="url(#ground)"/>
    <path d="M2 36.6 L62 27.4" stroke="#F4F8FC" stroke-width="2.4" stroke-linecap="round"/>
    <!-- Yunuslama (pitch) çizgileri -->
    <path d="M25 21.5 L39 19.4" stroke="#F4F8FC" stroke-opacity="0.55" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M28 14.9 L36 13.7" stroke="#F4F8FC" stroke-opacity="0.35" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M25 44.9 L39 42.8" stroke="#F9EFD9" stroke-opacity="0.5" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- Uçak sembolü (HUD) -->
  <path d="M12.5 34.5 L24 34.5 L27 38" stroke="#FFC65C" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M51.5 34.5 L40 34.5 L37 38" stroke="#FFC65C" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="32" cy="34.5" r="2.6" fill="#FFC65C"/>

  <!-- Çerçeve -->
  <circle cx="32" cy="32" r="26" stroke="#0B1D33" stroke-width="3.2"/>
  <circle cx="32" cy="32" r="29" stroke="#0B1D33" stroke-opacity="0.28" stroke-width="1.6"/>
</svg>
