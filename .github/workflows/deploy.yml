name: GitHub Pages'e Dağıt

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Derle
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu al
        uses: actions/checkout@v4
      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Bağımlılıkları yükle
        run: npm ci
      - name: Siteyi derle
        run: npm run build
      - name: Pages yapılandır
        uses: actions/configure-pages@v5
      - name: Yapıyı yükle
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Yayınla
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages'e dağıt
        id: deployment
        uses: actions/deploy-pages@v4
